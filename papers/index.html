<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un paper al día</title>

    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">

    <style>
        :root {
            --bg: #fafaf9;
            --surface: #ffffff;
            --text: #1c1917;
            --text-secondary: #78716c;
            --accent: #b45309;
            --accent-light: #fef3c7;
            --border: #e7e5e4;
            --radius: 8px;
            --font-body: 'Georgia', 'Times New Roman', serif;
            --font-ui: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --max-width: 720px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* --- LAYOUT --- */
        .site-header {
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .site-title {
            font-family: var(--font-ui);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }

        .site-title:hover { color: var(--accent); }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 20px;
            font-family: var(--font-ui);
            font-size: 0.85rem;
        }

        .header-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .header-nav a:hover,
        .header-nav a.active { color: var(--accent); }

        .search-box {
            font-family: var(--font-ui);
            font-size: 0.85rem;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            width: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus { border-color: var(--accent); }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 40px 24px 120px;
        }

        /* --- HOME --- */
        .page-heading {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .stats-row {
            display: flex;
            gap: 32px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            font-family: var(--font-ui);
        }

        .stat { text-align: left; }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* --- HEATMAP --- */
        .heatmap-section {
            margin-bottom: 48px;
        }

        .heatmap-grid {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            max-width: 100%;
        }

        .heatmap-cell {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            background: var(--border);
            transition: background 0.2s;
        }

        .heatmap-cell.filled {
            background: var(--accent);
        }

        .heatmap-cell.today {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        .heatmap-cell[title] { cursor: help; }

        .heatmap-months {
            display: flex;
            gap: 3px;
            margin-bottom: 4px;
            font-family: var(--font-ui);
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        /* --- PAPER LIST --- */
        .paper-list { list-style: none; }

        .paper-item {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .paper-item:first-child { padding-top: 0; }

        .paper-item a {
            text-decoration: none;
            color: var(--text);
            display: block;
        }

        .paper-item a:hover .paper-title { color: var(--accent); }

        .paper-title {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 6px;
            transition: color 0.2s;
        }

        .paper-meta {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 6px 16px;
        }

        .paper-meta span { white-space: nowrap; }

        /* --- CATEGORY CHIPS --- */
        .category-list {
            list-style: none;
            margin-bottom: 48px;
        }

        .category-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .category-link {
            text-decoration: none;
            color: var(--text);
            font-family: var(--font-ui);
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.2s;
        }

        .category-link:hover { color: var(--accent); }

        .category-count {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 20px;
        }

        .subcategory-list {
            list-style: none;
            margin-left: 20px;
            margin-top: 8px;
        }

        .subcategory-item { padding: 6px 0; }

        .subcategory-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-family: var(--font-ui);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.2s;
        }

        .subcategory-link:hover { color: var(--accent); }

        /* --- TAGS --- */
        .tag {
            display: inline-block;
            font-family: var(--font-ui);
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--accent-light);
            color: var(--accent);
            text-decoration: none;
            transition: background 0.2s;
        }

        .tag:hover { background: #fde68a; }

        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        /* --- SINGLE PAPER VIEW --- */
        .paper-header { margin-bottom: 40px; }

        .paper-header .paper-title {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .paper-header .paper-meta {
            margin-bottom: 12px;
        }

        .paper-source {
            font-family: var(--font-ui);
            font-size: 0.82rem;
            margin-top: 10px;
        }

        .paper-source a {
            color: var(--accent);
            text-decoration: none;
            word-break: break-all;
        }

        .paper-source a:hover { text-decoration: underline; }

        .paper-body h2 {
            font-family: var(--font-ui);
            font-size: 1.05rem;
            font-weight: 700;
            margin: 36px 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        .paper-body h2:first-child { margin-top: 0; }

        .paper-body p {
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .paper-body ol,
        .paper-body ul {
            margin-bottom: 16px;
            padding-left: 24px;
        }

        .paper-body li { margin-bottom: 8px; }

        .paper-body blockquote {
            border-left: 3px solid var(--accent);
            padding: 12px 20px;
            margin: 20px 0;
            background: var(--accent-light);
            border-radius: 0 var(--radius) var(--radius) 0;
            font-style: italic;
            color: var(--text-secondary);
        }

        .paper-body strong { color: var(--text); }

        .paper-body code {
            font-size: 0.9em;
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* --- REFERENCES/BACKLINKS --- */
        .references-section {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .references-title {
            font-family: var(--font-ui);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .ref-list { list-style: none; }

        .ref-list li { padding: 6px 0; }

        .ref-list a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .ref-list a:hover { text-decoration: underline; }

        .empty-note {
            font-family: var(--font-ui);
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* --- BACK LINK --- */
        .back-link {
            font-family: var(--font-ui);
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        /* --- SEARCH RESULTS --- */
        .search-results-heading {
            font-family: var(--font-ui);
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .search-results-heading strong {
            color: var(--text);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-family: var(--font-ui);
        }

        .no-results p { font-size: 0.95rem; }

        /* --- FOOTER --- */
        .site-footer {
            text-align: center;
            padding: 40px 24px;
            font-family: var(--font-ui);
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .header-inner {
                flex-wrap: wrap;
            }

            .search-box { width: 100%; order: 3; }

            .stats-row { gap: 20px; }

            .stat-number { font-size: 1.5rem; }

            .paper-header .paper-title { font-size: 1.25rem; }

            .heatmap-cell { width: 11px; height: 11px; }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="#/" class="site-title">Un paper al día</a>
            <nav class="header-nav">
                <a href="#/">Inicio</a>
                <a href="#/categorias">Categorías</a>
            </nav>
            <input type="text" class="search-box" id="search-input" placeholder="Buscar papers..." autocomplete="off">
        </div>
    </header>

    <div class="container" id="app"></div>

    <script src="data/papers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
    (function () {
        'use strict';

        const $ = id => document.getElementById(id);
        const app = $('app');
        const searchInput = $('search-input');

        /* ---- Markdown ---- */
        marked.setOptions({ breaks: true, gfm: true });

        function md(text) {
            return marked.parse(text || '');
        }

        /* ---- Data helpers ---- */
        function getPapers() {
            return (window.PAPERS || []).slice().sort((a, b) =>
                b.read_date.localeCompare(a.read_date)
            );
        }

        function findPaper(slug) {
            return (window.PAPERS || []).find(p => p.slug === slug);
        }

        function getBacklinks(slug) {
            return getPapers().filter(p => p.references && p.references.includes(slug));
        }

        function getCategories() {
            const cats = {};
            getPapers().forEach(p => {
                if (!cats[p.category]) cats[p.category] = {};
                if (!cats[p.category][p.subcategory]) cats[p.category][p.subcategory] = [];
                cats[p.category][p.subcategory].push(p);
            });
            return cats;
        }

        function searchPapers(query) {
            const q = query.toLowerCase().trim();
            if (!q) return [];
            const terms = q.split(/\s+/);
            return getPapers().filter(p => {
                const haystack = [
                    p.title,
                    p.authors.join(' '),
                    p.category,
                    p.subcategory,
                    p.tags.join(' '),
                    p.journal || '',
                    p.body
                ].join(' ').toLowerCase();
                return terms.every(t => haystack.includes(t));
            });
        }

        /* ---- Date formatting ---- */
        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('es-CL', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        /* ---- Heatmap ---- */
        function renderHeatmap() {
            const papers = getPapers();
            const readDates = new Set(papers.map(p => p.read_date));
            const today = new Date();
            const startOfYear = new Date(today.getFullYear(), 0, 1);
            const todayStr = today.toISOString().slice(0, 10);

            let cells = '';
            const d = new Date(startOfYear);

            while (d <= today) {
                const ds = d.toISOString().slice(0, 10);
                const filled = readDates.has(ds) ? ' filled' : '';
                const isToday = ds === todayStr ? ' today' : '';
                const title = readDates.has(ds)
                    ? papers.filter(p => p.read_date === ds).map(p => p.title).join(', ')
                    : formatDate(ds);
                cells += `<div class="heatmap-cell${filled}${isToday}" title="${ds}: ${title}"></div>`;
                d.setDate(d.getDate() + 1);
            }

            return `<div class="heatmap-section">
                <div class="page-heading">Racha de lectura ${today.getFullYear()}</div>
                <div class="heatmap-grid">${cells}</div>
            </div>`;
        }

        /* ---- Render: paper list item ---- */
        function renderPaperItem(p) {
            return `<li class="paper-item">
                <a href="#/paper/${p.slug}">
                    <div class="paper-title">${p.title}</div>
                    <div class="paper-meta">
                        <span>${p.authors.join(', ')} (${p.year})</span>
                        <span>Leído: ${formatDate(p.read_date)}</span>
                        ${p.journal ? `<span>${p.journal}</span>` : ''}
                    </div>
                    <div class="tags-row">
                        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                </a>
            </li>`;
        }

        /* ---- Views ---- */
        function viewHome() {
            const papers = getPapers();
            const totalPapers = papers.length;
            const categories = Object.keys(getCategories()).length;

            /* Racha actual */
            let streak = 0;
            const readDates = new Set(papers.map(p => p.read_date));
            const d = new Date();
            while (true) {
                const ds = d.toISOString().slice(0, 10);
                if (readDates.has(ds)) {
                    streak++;
                    d.setDate(d.getDate() - 1);
                } else {
                    break;
                }
            }

            app.innerHTML = `
                <div class="stats-row">
                    <div class="stat">
                        <div class="stat-number">${totalPapers}</div>
                        <div class="stat-label">${totalPapers === 1 ? 'Paper leído' : 'Papers leídos'}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">${categories}</div>
                        <div class="stat-label">${categories === 1 ? 'Categoría' : 'Categorías'}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">${streak}</div>
                        <div class="stat-label">${streak === 1 ? 'Día de racha' : 'Días de racha'}</div>
                    </div>
                </div>
                ${renderHeatmap()}
                <div class="page-heading">Todos los papers</div>
                <ul class="paper-list">
                    ${papers.map(renderPaperItem).join('')}
                </ul>
            `;
        }

        function viewPaper(slug) {
            const p = findPaper(slug);
            if (!p) {
                app.innerHTML = `<div class="no-results"><p>Paper no encontrado.</p></div>`;
                return;
            }

            const refs = (p.references || []).map(findPaper).filter(Boolean);
            const backlinks = getBacklinks(slug);

            app.innerHTML = `
                <a href="#/" class="back-link">← Volver</a>
                <div class="paper-header">
                    <div class="paper-title">${p.title}</div>
                    <div class="paper-meta">
                        <span>${p.authors.join(', ')} (${p.year})</span>
                        ${p.journal ? `<span>${p.journal}${p.volume ? `, ${p.volume}` : ''}${p.issue ? `(${p.issue})` : ''}${p.pages ? `, ${p.pages}` : ''}` : ''}</span>
                        <span>Leído: ${formatDate(p.read_date)}</span>
                    </div>
                    <div class="tags-row">
                        ${p.tags.map(t => `<a class="tag" href="#/buscar/${encodeURIComponent(t)}">${t}</a>`).join('')}
                    </div>
                    ${p.source ? `<div class="paper-source">Fuente: <a href="${p.source}" target="_blank" rel="noopener">${p.doi ? 'DOI: ' + p.doi : p.source}</a></div>` : ''}
                </div>
                <div class="paper-body">${md(p.body)}</div>
                <div class="references-section">
                    <div class="references-title">Referencias enlazadas</div>
                    ${refs.length
                        ? `<ul class="ref-list">${refs.map(r => `<li><a href="#/paper/${r.slug}">${r.title}</a> — ${r.authors.join(', ')} (${r.year})</li>`).join('')}</ul>`
                        : `<p class="empty-note">Este paper aún no tiene referencias enlazadas con otros del sitio.</p>`
                    }
                </div>
                <div class="references-section" style="border-top:none; margin-top:24px;">
                    <div class="references-title">Citado en</div>
                    ${backlinks.length
                        ? `<ul class="ref-list">${backlinks.map(r => `<li><a href="#/paper/${r.slug}">${r.title}</a> — ${r.authors.join(', ')} (${r.year})</li>`).join('')}</ul>`
                        : `<p class="empty-note">Ningún otro paper del sitio referencia a este todavía.</p>`
                    }
                </div>
            `;

            document.title = `${p.title} — Un paper al día`;
        }

        function viewCategories() {
            const cats = getCategories();

            let html = `<div class="page-heading">Categorías</div><ul class="category-list">`;

            Object.keys(cats).sort().forEach(cat => {
                const subs = cats[cat];
                const total = Object.values(subs).reduce((s, arr) => s + arr.length, 0);

                html += `<li class="category-item">
                    <a class="category-link" href="#/categoria/${encodeURIComponent(cat)}">
                        <span>${cat}</span>
                        <span class="category-count">${total}</span>
                    </a>
                    <ul class="subcategory-list">`;

                Object.keys(subs).sort().forEach(sub => {
                    html += `<li class="subcategory-item">
                        <a class="subcategory-link" href="#/categoria/${encodeURIComponent(cat)}/${encodeURIComponent(sub)}">
                            <span>${sub}</span>
                            <span class="category-count">${subs[sub].length}</span>
                        </a>
                    </li>`;
                });

                html += `</ul></li>`;
            });

            html += `</ul>`;
            app.innerHTML = html;
        }

        function viewCategory(cat, sub) {
            const papers = getPapers().filter(p => {
                if (sub) return p.category === cat && p.subcategory === sub;
                return p.category === cat;
            });

            const title = sub ? `${cat} → ${sub}` : cat;

            app.innerHTML = `
                <a href="#/categorias" class="back-link">← Categorías</a>
                <div class="page-heading">${title}</div>
                ${papers.length
                    ? `<ul class="paper-list">${papers.map(renderPaperItem).join('')}</ul>`
                    : `<div class="no-results"><p>No hay papers en esta categoría.</p></div>`
                }
            `;
        }

        function viewSearch(query) {
            const results = searchPapers(query);

            app.innerHTML = `
                <a href="#/" class="back-link">← Inicio</a>
                <div class="search-results-heading">
                    ${results.length} resultado${results.length !== 1 ? 's' : ''} para <strong>"${query}"</strong>
                </div>
                ${results.length
                    ? `<ul class="paper-list">${results.map(renderPaperItem).join('')}</ul>`
                    : `<div class="no-results"><p>No se encontraron papers. Intenta con otros términos.</p></div>`
                }
            `;
        }

        /* ---- Router ---- */
        function route() {
            const hash = location.hash || '#/';
            const parts = hash.slice(2).split('/').map(decodeURIComponent);

            /* Reset title */
            document.title = 'Un paper al día';

            /* Highlight nav */
            document.querySelectorAll('.header-nav a').forEach(a => {
                a.classList.toggle('active', a.getAttribute('href') === '#/' + (parts[0] || ''));
            });

            if (parts[0] === 'paper' && parts[1]) {
                viewPaper(parts[1]);
            } else if (parts[0] === 'categorias') {
                viewCategories();
            } else if (parts[0] === 'categoria' && parts[1]) {
                viewCategory(parts[1], parts[2] || null);
            } else if (parts[0] === 'buscar' && parts[1]) {
                searchInput.value = parts[1];
                viewSearch(parts[1]);
            } else {
                viewHome();
            }

            window.scrollTo(0, 0);
        }

        /* ---- Search ---- */
        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const q = searchInput.value.trim();
                if (q) {
                    location.hash = '#/buscar/' + encodeURIComponent(q);
                } else {
                    location.hash = '#/';
                }
            }, 300);
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(searchTimeout);
                const q = searchInput.value.trim();
                if (q) {
                    location.hash = '#/buscar/' + encodeURIComponent(q);
                }
            }
        });

        /* ---- Init ---- */
        window.addEventListener('hashchange', route);
        route();
    })();
    </script>
</body>

</html>
