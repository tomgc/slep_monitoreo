            <stop offset="0%" stop-color="#4A2746"/>
            <stop offset="100%" stop-color="#2c1729"/>
        </linearGradient>
    </defs>
    <rect width="1200" height="630" fill="url(#bg)"/>

    <g transform="translate(80, 200)">
